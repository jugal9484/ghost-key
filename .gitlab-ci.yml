stages:
  - lint
  - test

default:
  image: python:3.12-slim
  cache:
    key: pip-$CI_JOB_IMAGE
    paths:
      - .cache/pip
  before_script:
    - export PIP_CACHE_DIR="$CI_PROJECT_DIR/.cache/pip"

lint:
  stage: lint
  script:
    - pip install ruff
    - ruff check .

test:
  stage: test
  parallel:
    matrix:
      - PYTHON_IMAGE: ["python:3.9-slim", "python:3.12-slim"]
  image: $PYTHON_IMAGE
  script:
    - pip install pytest
    - pytest -q
